<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LynxSec — 网络安全 Agent 管理平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        // Agent-specific accent palette
        agent: {
          dispatcher: '#00d4aa',
          recon:      '#4da6ff',
          pentest:    '#ff6b6b',
          auditor:    '#c084fc',
          reporter:   '#fbbf24',
        },
        surface: {
          900: '#080c12',
          800: '#0d1219',
          700: '#111720',
          600: '#161d28',
          500: '#1c2430',
          400: '#243041',
        },
      },
      fontFamily: {
        mono:  ['JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'monospace'],
        sans:  ['Inter', 'system-ui', '-apple-system', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
        display: ['Inter', 'system-ui', '-apple-system', 'PingFang SC', 'sans-serif'],
      },
    },
  },
}
</script>
<style>
/* ===== FONTS ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  background: #080c12;
  color: #c8d2e0;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#0d1219; }
::-webkit-scrollbar-thumb { background:#243041; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#344860; }

/* ===== SCANLINE OVERLAY ===== */
body::after {
  content: '';
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.015) 2px,
    rgba(0,0,0,0.015) 4px
  );
  pointer-events: none; z-index:9998;
}

/* ===== GRID BACKGROUND ===== */
.grid-bg {
  background-image:
    linear-gradient(rgba(0,212,170,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.018) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ===== STATUS INDICATORS ===== */
.status-ring {
  display:inline-flex; align-items:center; justify-content:center;
  position:relative;
}
.status-ring::before {
  content:''; width:8px; height:8px; border-radius:50%; display:block;
}
.status-ring::after {
  content:''; position:absolute; width:16px; height:16px; border-radius:50%;
  border:1px solid transparent; opacity:0;
}
.status-ring.idle::before   { background:#00d4aa; box-shadow:0 0 6px rgba(0,212,170,0.5); }
.status-ring.working::before { background:#4da6ff; box-shadow:0 0 8px rgba(77,166,255,0.6); }
.status-ring.working::after  { border-color:rgba(77,166,255,0.3); opacity:1; animation:ring-pulse 2s infinite; }
.status-ring.blocked::before { background:#f59e0b; box-shadow:0 0 8px rgba(245,158,11,0.6); }
.status-ring.blocked::after  { border-color:rgba(245,158,11,0.3); opacity:1; animation:ring-pulse 2s infinite; }
.status-ring.running::before { background:#4da6ff; box-shadow:0 0 8px rgba(77,166,255,0.6); }
.status-ring.running::after  { border-color:rgba(77,166,255,0.3); opacity:1; animation:ring-pulse 2s infinite; }
.status-ring.halted::before  { background:#f59e0b; box-shadow:0 0 8px rgba(245,158,11,0.6); }
.status-ring.completed::before { background:#00d4aa; box-shadow:0 0 6px rgba(0,212,170,0.5); }
.status-ring.offline::before { background:#374151; box-shadow:none; }

@keyframes ring-pulse {
  0%   { transform:scale(0.8); opacity:0.8; }
  100% { transform:scale(1.6); opacity:0; }
}

/* ===== RESULT BADGES ===== */
.badge {
  font-size:9px; padding:2px 7px; border-radius:3px;
  font-family:'JetBrains Mono',monospace; font-weight:500;
  letter-spacing:0.5px; text-transform:uppercase;
}
.badge.success { background:rgba(0,212,170,0.12); color:#00d4aa; border:1px solid rgba(0,212,170,0.2); }
.badge.failed  { background:rgba(255,107,107,0.12); color:#ff6b6b; border:1px solid rgba(255,107,107,0.2); }
.badge.skipped { background:rgba(148,163,184,0.1);  color:#94a3b8; border:1px solid rgba(148,163,184,0.15); }
.badge.blocked { background:rgba(245,158,11,0.12);  color:#f59e0b; border:1px solid rgba(245,158,11,0.2); }

/* ===== GLASS CARDS ===== */
.glass {
  background: rgba(13,18,25,0.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.glass:hover {
  border-color: rgba(255,255,255,0.1);
}

/* ===== SUMMARY CARDS ===== */
.summary-card {
  position:relative; overflow:hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.summary-card:hover {
  transform:translateY(-2px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.summary-card .card-icon {
  position:absolute; right:12px; top:12px;
  font-size:20px; opacity:0.15;
  transition:opacity 0.3s;
}
.summary-card:hover .card-icon { opacity:0.3; }

/* ===== AGENT ROW ===== */
.agent-row {
  transition: all 0.2s;
  border-left: 2px solid transparent;
}
.agent-row:hover {
  background: rgba(255,255,255,0.02);
  border-left-color: currentColor;
}

/* ===== PIPELINE ===== */
.pipe-step {
  width:22px; height:22px; border-radius:50%;
  border:2px solid #1c2430; background:transparent;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600; font-family:'JetBrains Mono',monospace;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.pipe-step.done {
  border-color:#00d4aa; background:rgba(0,212,170,0.1); color:#00d4aa;
  box-shadow: 0 0 8px rgba(0,212,170,0.15);
}
.pipe-step.active {
  border-color:#4da6ff; background:rgba(77,166,255,0.1); color:#4da6ff;
  box-shadow: 0 0 12px rgba(77,166,255,0.2);
  animation:pipe-active 2s infinite;
}
@keyframes pipe-active {
  0%,100% { box-shadow:0 0 8px rgba(77,166,255,0.15); }
  50%     { box-shadow:0 0 16px rgba(77,166,255,0.35); }
}
.pipe-step.pending { border-color:#1c2430; color:#374151; }
.pipe-connector {
  width:32px; height:2px; background:#1c2430;
  transition:background 0.4s;
}
.pipe-connector.done { background:#00d4aa; }

/* ===== TERMINAL ===== */
.term { font-family:'JetBrains Mono','Fira Code',monospace; font-size:12px; line-height:1.9; }
.term .ts  { color:#374151; }
.term .cmd { color:#4da6ff; }
.term .info{ color:#7c8ba0; }
.term .warn{ color:#f59e0b; }
.term .err { color:#ff6b6b; }
.term .ok  { color:#00d4aa; }
.term .dim { color:#374151; }

/* ===== NAVIGATION ===== */
.nav-link {
  transition: all 0.2s;
  border-radius: 6px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.nav-link:hover { background: rgba(255,255,255,0.04); color:#e2e8f0; }
.nav-link.active {
  color:#00d4aa;
  background: rgba(0,212,170,0.08);
  font-weight:600;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== TOOLTIP ===== */
[data-tooltip] { position:relative; }
[data-tooltip]:hover::after {
  content:attr(data-tooltip);
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:#161d28; color:#c8d2e0; font-size:11px; padding:4px 8px;
  border-radius:4px; white-space:nowrap; z-index:100;
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:none;
}

/* ===== TOAST ===== */
.toast {
  position:fixed; bottom:28px; right:28px; z-index:9999;
  padding:10px 18px; border-radius:8px; font-size:13px;
  font-weight:500;
  backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  animation:slideUp 0.3s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== TAB CONTENT ===== */
.tab-content { animation: fadeInUp 0.35s ease; }

/* ===== PROGRESS BAR ===== */
.bar-track { background:rgba(255,255,255,0.03); border-radius:3px; overflow:hidden; height:3px; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); position:relative; }
.bar-fill::after {
  content:''; position:absolute; right:0; top:0; bottom:0;
  width:20px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.2));
}

/* ===== LOGO ===== */
.logo-mark {
  width:34px; height:34px;
  background: linear-gradient(135deg, #00d4aa 0%, #0891b2 100%);
  border-radius: 8px;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 20px rgba(0,212,170,0.2);
  position:relative;
}
.logo-mark::after {
  content:''; position:absolute; inset:-1px; border-radius:9px;
  background:linear-gradient(135deg, rgba(0,212,170,0.3), transparent);
  z-index:-1;
}
.logo-text {
  font-weight:800; font-size:15px; color:#080c12;
  font-family:'JetBrains Mono',monospace;
}

/* ===== SIDEBAR ===== */
.sidebar-divider {
  height:1px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
}

/* ===== LINK GLOW ===== */
.glow-text {
  text-shadow: 0 0 20px rgba(0,212,170,0.3);
}
</style>
</head>
<body class="grid-bg">

<!-- ===== TOAST ===== -->
<div id="toast" class="toast" style="display:none"></div>

<div class="flex h-screen overflow-hidden">

  <!-- ===== SIDEBAR ===== -->
  <aside class="w-56 bg-[#0a0f16] border-r border-white/5 flex flex-col flex-shrink-0">
    <!-- Logo -->
    <div class="px-5 py-5 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="logo-mark">
          <span class="logo-text">L</span>
        </div>
        <div>
          <h1 class="text-sm font-bold text-white tracking-wide glow-text">LynxSec</h1>
          <p class="text-[10px] text-gray-500 font-mono tracking-wider" id="versionTag">v0.2.0</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-5 space-y-1">
      <div class="text-[9px] text-gray-600 uppercase tracking-[0.15em] px-3 mb-3 font-semibold">导航</div>
      <a href="#" class="nav-link flex items-center gap-3 px-3 py-2.5 text-sm active" data-tab="dashboard">

        <span class="spin inline-block w-3 h-3 border-2 border-gray-600 border-t-[#00d4aa] rounded-full"></span>

      <div class="mt-1 text-[9px] text-gray-700 font-mono">LynxSec Engine</div>

  <!-- ===== MAIN ===== -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Top bar -->
    <header class="h-12 border-b border-white/5 flex items-center justify-between px-6 flex-shrink-0" style="background:rgba(10,15,22,0.9); backdrop-filter:blur(12px);">
      <div class="flex items-center gap-3">

    <!-- Content area -->
    <div class="flex-1 overflow-auto p-6">

      <div id="tab-dashboard" class="tab-content space-y-5">

        <!-- Summary cards -->
        <div class="grid grid-cols-5 gap-3" id="summaryCards"></div>

        <!-- Agent overview + pipeline mini -->

                </tr>
              </thead>

      <div id="tab-reports" class="tab-content hidden">

    </div>

<!-- ===== MAIN SCRIPT ===== -->
<script>
// ========== STATE ==========
const STATE_DIR = '../state/';
const AGENT_KEYS = ['recon', 'pentest', 'auditor', 'reporter'];

const AGENT_META = {
  dispatcher: { label:'调度器',   color:'#00d4aa', icon:'🎯' },
  recon:      { label:'情报收集', color:'#4da6ff', icon:'🔍' },
  pentest:    { label:'渗透测试', color:'#ff6b6b', icon:'⚔️' },
  auditor:    { label:'安全审计', color:'#c084fc', icon:'🛡️' },
  reporter:   { label:'报告生成', color:'#fbbf24', icon:'📋' },
};
const AGENT_ORDER = ['dispatcher', 'recon', 'pentest', 'auditor', 'reporter'];

let agentData   = {};
let pipelineData= {};
let toolsData   = {};

// ========== FETCH ==========
async function fetchJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status} ${path}`);
  return res.json();
}

async function loadAll() {
  const results = await Promise.allSettled([
    fetchJSON(STATE_DIR + 'recon_status.json'),
    fetchJSON(STATE_DIR + 'pentest_status.json'),
    fetchJSON(STATE_DIR + 'auditor_status.json'),
    fetchJSON(STATE_DIR + 'reporter_status.json'),
    fetchJSON(STATE_DIR + 'pipeline.json'),
    fetchJSON(STATE_DIR + 'tools_available.json'),
  ]);

  const files = ['recon','pentest','auditor','reporter','pipeline','tools'];
  const ok = results.filter(r => r.status === 'fulfilled').length;
  const total = results.length;

  results.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      if (i < 4) agentData[files[i]] = r.value;
      else if (i === 4) pipelineData = r.value;
      else toolsData = r.value;
    } else {
      if (i < 4) {
        agentData[files[i]] = {
          status: 'offline',
          result: null,
          current_task: null,
          outputs: [],
        };
      }
    }
  });

  agentData.dispatcher = {
    status: pipelineData.status || 'idle',
    result: null,
    current_task: pipelineData.current_step || null,
    outputs: [],
  };

  document.getElementById('sidebarStatus').innerHTML =
    `<span class="status-ring idle"></span><span class="text-gray-500 text-[11px]">${ok}/${total} 数据源就绪</span>`;
  if (ok < total) showToast('部分数据源加载失败', 'warn');
  else showToast('数据同步完成', 'ok');

  renderAll();
}

// ========== HELPERS ==========
function statusRing(status) {
  return `<span class="status-ring ${status || 'idle'}"></span>`;
}

function statusText(status) {
  const map = {
    idle:'空闲', working:'执行中', running:'运行中',
    blocked:'阻塞', halted:'已暂停', completed:'已完成', offline:'未启动'
  };
  return map[status] || status || '未知';
}

function resultBadge(result) {
  if (!result) return '';
  return `<span class="badge ${result}">${result}</span>`;
}

function statusColor(status) {
  return {
    idle:'#00d4aa', working:'#4da6ff', running:'#4da6ff',
    blocked:'#f59e0b', halted:'#f59e0b', completed:'#00d4aa'
  }[status] || '#627597';
}

function formatTime() {
  const d = new Date();
  return d.toLocaleString('zh-CN', { hour12:false });
}

// ========== RENDER ALL ==========
function renderAll() {
  renderSummaryCards();
  renderDashAgents();
  renderDashPipeline();
  renderDashOutputs();
  renderAgentsFullTable();
  renderPipelineDetail();
  renderTools();
  renderReports();
  updateTopBar();
}

// ========== SUMMARY CARDS ==========
function renderSummaryCards() {
  const idleCount = AGENT_ORDER.filter(n => agentData[n]?.status === 'idle' || agentData[n]?.status === 'completed').length;
  const workingCount = AGENT_ORDER.filter(n => agentData[n]?.status === 'working' || agentData[n]?.status === 'running').length;
  const blockedCount = AGENT_ORDER.filter(n => agentData[n]?.status === 'blocked' || agentData[n]?.status === 'halted').length;

  let totalOutputs = 0;
  AGENT_KEYS.forEach(k => {
    const out = agentData[k]?.outputs;
    if (Array.isArray(out)) totalOutputs += out.length;
  });

  const stepsDone = (pipelineData.steps_completed || []).length;
  const stepsTotal = pipelineData.steps_total || (pipelineData.steps ? pipelineData.steps.length : 4);

  const cards = [
    { icon:'✅', label:'就绪',      value:idleCount,    sub:'Agent', color:'#00d4aa', pct:idleCount/5*100 },
    { icon:'⚡', label:'执行中',    value:workingCount, sub:'Agent', color:'#4da6ff', pct:workingCount/5*100 },
    { icon:'⚠️', label:'阻塞',      value:blockedCount, sub:'Agent', color:'#f59e0b', pct:blockedCount/5*100 },
    { icon:'📦', label:'产出文件',  value:totalOutputs, sub:'个',    color:'#c084fc', pct:Math.min(totalOutputs/20*100,100) },
    { icon:'🔗', label:'流水线',    value:stepsDone,    sub:`/${stepsTotal}`, color:'#fbbf24', pct:stepsDone/Math.max(stepsTotal,1)*100 },
  ];

  document.getElementById('summaryCards').innerHTML = cards.map(c => `
    <div class="glass summary-card p-4" style="border-top:2px solid ${c.color}20">
      <span class="card-icon">${c.icon}</span>
      <div class="text-[10px] text-gray-500 uppercase tracking-[0.15em] mb-1 font-semibold">${c.label}</div>
      <div class="flex items-baseline gap-1">
        <span class="text-2xl font-bold text-white font-mono tracking-tight">${c.value}</span>
        <span class="text-[11px] text-gray-500 font-normal">${c.sub}</span>
      </div>
      <div class="mt-2 bar-track">
        <div class="bar-fill" style="width:${c.pct}%; background:${c.color}"></div>
      </div>
    </div>
  `).join('');
}

// ========== DASH AGENT LIST ==========
function renderDashAgents() {
  document.getElementById('dashAgentList').innerHTML = AGENT_ORDER.map(name => {
    const d = agentData[name];
    const meta = AGENT_META[name];
    if (!d) return '';
    return `
      <div class="agent-row flex items-center justify-between py-2.5 px-3 rounded-md" style="color:${meta.color}">
        <div class="flex items-center gap-3">
          <span class="text-sm">${meta.icon}</span>
          <span class="text-sm text-white font-semibold">${name}</span>
          <span class="text-[10px] text-gray-600">${meta.label}</span>
        </div>
        <div class="flex items-center gap-3 text-xs">
          ${statusRing(d.status)}
          <span style="color:${statusColor(d.status)}">${statusText(d.status)}</span>
          ${resultBadge(d.result)}
          ${d.current_task ? `<span class="text-gray-600 text-[10px] font-mono truncate max-w-[140px]" title="${d.current_task}">${d.current_task}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ========== DASH PIPELINE ==========
function renderDashPipeline() {
  const steps = pipelineData.steps || ['recon', 'pentest', 'auditor', 'reporter'];
  const current = pipelineData.current_step;
  const completed = (pipelineData.steps_completed || []).length;
  const status = pipelineData.status || 'idle';

  const html = `
    <div class="mb-4 flex items-center gap-3">
      <span class="text-[10px] text-gray-500 font-mono tracking-wider">Task</span>
      <span class="text-sm text-white font-mono font-semibold">${pipelineData.task_id || '—'}</span>
      <span class="text-[11px] ml-auto" style="color:${statusColor(status)}">● ${statusText(status)}</span>
    </div>
    <div class="flex items-center gap-0 flex-wrap mb-2">
      ${steps.map((s, i) => {
        let cls = 'pending';
        let icon = i + 1;
        if (i < completed) { cls = 'done'; icon = '✓'; }
        else if (s === current) { cls = 'active'; icon = i + 1; }
        return `
          <div class="pipe-step ${cls}" data-tooltip="${s}">${icon}</div>
          ${i < steps.length - 1 ? `<div class="pipe-connector ${i < completed ? 'done' : ''}"></div>` : ''}
        `;
      }).join('')}
    </div>
    <div class="flex gap-0 flex-wrap">
      ${steps.map((s, i) => {
        let cls = i < completed ? 'text-[#00d4aa]' : (s === current ? 'text-[#4da6ff]' : 'text-gray-600');
        const label = AGENT_META[s]?.label || s.substring(0,4);
        return `<span class="text-[9px] font-semibold ${cls}" style="width:22px; text-align:center; margin-right:${i < steps.length-1 ? '32px' : '0'}">${label.substring(0,2)}</span>`;
      }).join('')}
    </div>
  `;
  document.getElementById('dashPipeline').innerHTML = html;
}

// ========== DASH OUTPUTS ==========
function renderDashOutputs() {
  const lines = [];
  AGENT_KEYS.forEach(k => {
    const d = agentData[k];
    if (!d) return;
    const outs = d.outputs;
    if (Array.isArray(outs)) {
      outs.forEach(o => {
        if (typeof o === 'string') lines.push({ agent:k, file:o, result:d.result });
        else if (o && o.file) lines.push({ agent:k, file:o.file, result:o.result || d.result });
      });
    }
  });

  if (lines.length === 0) {
    document.getElementById('dashOutputs').innerHTML =
      '<div class="text-gray-600 text-xs py-3"><span class="dim">$</span> <span class="ts">no outputs yet</span></div>';
    return;
  }

  document.getElementById('dashOutputs').innerHTML = lines.map(l => `
    <div class="flex items-center gap-2">
      <span class="dim">$</span>
      <span class="cmd">[${l.agent}]</span>
      ${resultBadge(l.result)}
      <span class="info">→</span>
      <span class="text-gray-300 text-[11px] truncate">${l.file}</span>
    </div>
  `).join('');
}

// ========== AGENTS FULL TABLE ==========
function renderAgentsFullTable() {
  document.getElementById('agentsFullTable').innerHTML = AGENT_ORDER.map(name => {
    const d = agentData[name];
    const meta = AGENT_META[name];
    if (!d) return '';
    const outs = Array.isArray(d.outputs) ? d.outputs : [];
    const outputStr = outs.length > 0
      ? outs.map(o => typeof o === 'string' ? o.replace(/^.*[\\/]/, '') : (o.file||'').replace(/^.*[\\/]/, '')).join(', ')
      : '—';
    return `
      <tr class="agent-row" style="color:${meta.color}">
        <td class="py-3 pl-1">
          <span class="text-sm mr-2">${meta.icon}</span>
          <span class="text-white font-semibold">${name}</span>
          <span class="text-[10px] text-gray-600 ml-2">${meta.label}</span>
        </td>
        <td class="py-3">
          ${statusRing(d.status)}
          <span class="text-xs ml-1.5 font-medium" style="color:${statusColor(d.status)}">${statusText(d.status)}</span>
        </td>
        <td class="py-3 text-xs text-gray-400 font-mono">${d.current_task || '<span class="text-gray-700">—</span>'}</td>
        <td class="py-3">${resultBadge(d.result) || '<span class="text-gray-700 text-[10px]">—</span>'}</td>
        <td class="py-3 text-[10px] text-gray-500 font-mono max-w-[200px] truncate" title="${outs.map(o => typeof o === 'string' ? o : o.file).join(', ')}">${outputStr}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('agentRefreshHint').textContent = `更新于 ${formatTime()}`;
}

// ========== PIPELINE DETAIL ==========
function renderPipelineDetail() {
  const steps = pipelineData.steps || ['recon', 'pentest', 'auditor', 'reporter'];
  const current = pipelineData.current_step;
  const completed = (pipelineData.steps_completed || []).length;

  const agentStatuses = AGENT_ORDER.map(name => {
    const d = agentData[name];
    if (!d) return null;
    const isCurrent = steps.includes(name) && name === current;
    const isDone = steps.includes(name) && steps.indexOf(name) < completed;
    const meta = AGENT_META[name];
    return { name, ...meta, status:d.status, result:d.result, current_task:d.current_task, isCurrent, isDone };
  }).filter(Boolean);

  document.getElementById('pipelineDetail').innerHTML = `
    <div class="mb-5 flex items-center gap-4 p-3 rounded-lg" style="background:rgba(255,255,255,0.02)">
      <span class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Task ID</span>
      <span class="text-sm text-white font-mono font-semibold">${pipelineData.task_id || '—'}</span>
      <span class="badge ml-auto" style="color:${statusColor(pipelineData.status)}; background:${statusColor(pipelineData.status)}15; border-color:${statusColor(pipelineData.status)}30">
        ${statusText(pipelineData.status)}
      </span>
    </div>
    <div class="space-y-2">
      ${agentStatuses.map((a, idx) => {
        const borderColor = a.isCurrent ? `${a.color}50` : a.isDone ? `${a.color}25` : 'transparent';
        const bgColor = a.isCurrent ? `${a.color}08` : a.isDone ? `${a.color}05` : 'transparent';
        return `
          <div class="agent-row flex items-center gap-4 py-3 px-4 rounded-lg border transition-all duration-300"
               style="border-color:${borderColor}; background:${bgColor}; color:${a.color}">
            <div class="flex items-center justify-center w-7 h-7 rounded-full text-[11px] font-bold font-mono"
                 style="background:${a.isDone ? a.color+'20' : a.isCurrent ? a.color+'15' : 'rgba(255,255,255,0.03)'}; color:${a.isDone ? a.color : a.isCurrent ? a.color : '#4b5563'}">
              ${a.isDone ? '✓' : idx + 1}
            </div>
            <span class="text-sm text-white font-semibold w-20">${a.name}</span>
            <span class="text-[10px] text-gray-600 w-16">${a.label}</span>
            ${statusRing(a.status)}
            <span class="text-xs font-medium" style="color:${statusColor(a.status)}">${statusText(a.status)}</span>
            ${resultBadge(a.result)}
            <span class="text-[10px] text-gray-500 font-mono flex-1 truncate">${a.current_task || ''}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// ========== TOOLS ==========
const FALLBACK_TOOLS = {
  recon:   { nmap: true, subfinder: true, whatweb: true },
  pentest: { sqlmap: true, nuclei: true, hydra: true },
};

function renderTools() {
  let source = toolsData;
  if (!source || Object.keys(source).length === 0) {
    source = FALLBACK_TOOLS;
  }

  const rows = [];
  for (const [category, toolMap] of Object.entries(source)) {
    if (typeof toolMap !== 'object') continue;
    for (const [tool, available] of Object.entries(toolMap)) {
      rows.push({ category, tool, available: !!available });
    }
  }

  if (rows.length === 0) {
    document.getElementById('toolsGrid').innerHTML =
      '<div class="text-gray-500 text-xs col-span-2 py-6 text-center"><span class="dim">暂无工具数据</span></div>';
    return;
  }

  document.getElementById('toolsGrid').innerHTML = rows.map(r => {
    const catColor = AGENT_META[r.category]?.color || '#627597';
    return `
      <div class="flex items-center justify-between p-3.5 rounded-lg border transition-all duration-200 hover:scale-[1.01]"
           style="border-color:rgba(255,255,255,0.04); background:rgba(255,255,255,0.01)">
        <div class="flex items-center gap-3">
          <span class="status-ring ${r.available ? 'idle' : 'offline'}"></span>
          <span class="text-sm text-white font-mono font-medium">${r.tool}</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-[10px] font-mono px-2 py-0.5 rounded" style="color:${catColor}; background:${catColor}10">${r.category}</span>
          <span class="text-[10px] font-medium ${r.available ? '' : 'text-gray-600'}" style="color:${r.available ? catColor : '#4b5563'}">
            ${r.available ? '可用' : '不可用'}
          </span>
        </div>
      </div>
    `;
  }).join('');
}

// ========== REPORTS ==========
function renderReports() {
  const reportFiles = [];
  AGENT_KEYS.forEach(k => {
    const d = agentData[k];
    if (!d) return;
    const outs = d.outputs;
    if (Array.isArray(outs)) {
      outs.forEach(o => {
        const filename = typeof o === 'string' ? o : o.file;
        if (filename) {
          const basename = filename.replace(/^.*[\\/]/, '');
          reportFiles.push({
            agent: k,
            filename: filename,
            basename: basename,
            result: typeof o === 'object' ? o.result : d.result,
          });
        }
      });
    }
  });

  if (reportFiles.length === 0) {
    document.getElementById('reportsList').innerHTML =
      '<div class="text-gray-500 text-xs py-6 text-center"><span class="dim">暂无报告产出</span></div>';
    return;
  }

  document.getElementById('reportsList').innerHTML = reportFiles.map(r => {
    const catColor = AGENT_META[r.agent]?.color || '#627597';
    const isHumanVersion = r.basename.includes('人话版');
    return `
      <div class="flex items-center justify-between py-3 px-4 rounded-lg border mb-2 transition-all duration-200 hover:scale-[1.005]"
           style="border-color:${catColor}15; background:rgba(255,255,255,0.01)">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-[10px] font-mono font-semibold px-2 py-0.5 rounded" style="color:${catColor}; background:${catColor}10">${r.agent}</span>
          <span class="text-sm text-white font-mono truncate">${r.basename}</span>
          ${isHumanVersion ? '<span class="text-[9px] text-gray-500 bg-white/5 px-1.5 py-0.5 rounded">人话版</span>' : ''}
          ${resultBadge(r.result)}
        </div>
        <span class="text-[10px] text-gray-600 font-mono ml-4 flex-shrink-0 truncate max-w-[260px]" title="${r.filename}">${r.filename}</span>
      </div>
    `;
  }).join('');
}

// ========== TOP BAR ==========
function updateTopBar() {
  const total = AGENT_ORDER.filter(n => agentData[n]).length;
  const working = AGENT_ORDER.filter(n => agentData[n]?.status === 'working' || agentData[n]?.status === 'running').length;
  document.getElementById('topAgentCount').innerHTML =
    `<span class="text-gray-500">${total}</span> Agent · <span style="color:#4da6ff">${working}</span> 执行中`;
  document.getElementById('topTaskId').textContent = pipelineData.task_id ? `# ${pipelineData.task_id}` : '';
}

// ========== NAVIGATION ==========
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => {
      l.classList.remove('active');
      l.classList.add('text-gray-400');
    });
    link.classList.add('active');
    link.classList.remove('text-gray-400');
    document.getElementById('pageTitle').textContent = link.textContent.trim().replace(/^[^\s]+\s/, '');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    const tabId = 'tab-' + link.dataset.tab;
    const tabEl = document.getElementById(tabId);
    if (tabEl) tabEl.classList.remove('hidden');
  });
});

// ========== TOAST ==========
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = (type === 'warn' ? '⚠ ' : '✓ ') + msg;
  el.style.display = 'block';
  el.style.background = type === 'warn'
    ? 'rgba(245,158,11,0.15)'
    : 'rgba(0,212,170,0.12)';
  el.style.color = type === 'warn' ? '#f59e0b' : '#00d4aa';
  el.style.borderColor = type === 'warn'
    ? 'rgba(245,158,11,0.25)'
    : 'rgba(0,212,170,0.2)';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ========== CLOCK ==========
function updateClock() {
  document.getElementById('sidebarClock').textContent = formatTime();
}
setInterval(updateClock, 30000);
updateClock();

// ========== BOOT ==========
loadAll();
setInterval(loadAll, 15000);
</script>
